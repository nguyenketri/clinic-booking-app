<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinic Admin Dashboard</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { height: 100vh; background-color: #343a40; color: white; padding-top: 20px;}
        .sidebar a { color: #adb5bd; text-decoration: none; padding: 10px 20px; display: block; }
        .sidebar a:hover, .sidebar a.active { color: white; background-color: #495057; }
        #loginSection, #dashboardSection { display: none; }
    </style>
</head>
<body>

    <!-- Login Section -->
    <div id="loginSection" class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-header text-center bg-primary text-white">
                        <h4>Admin Login</h4>
                    </div>
                    <div class="card-body">
                        <form id="loginForm">
                            <div class="mb-3">
                                <label>Email address</label>
                                <input type="email" class="form-control" id="email" required value="dummy@clinic.com">
                            </div>
                            <div class="mb-3">
                                <label>Password</label>
                                <input type="password" class="form-control" id="password" required value="123456">
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Login</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Dashboard Section -->
    <div id="dashboardSection" class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-2 sidebar">
                <h4 class="text-center mb-4">Clinic Admin</h4>
                <a href="#" class="nav-link active" onclick="showTab('doctors')">Doctors</a>
                <a href="#" class="nav-link" onclick="showTab('bookings')">Bookings</a>
                <button class="btn btn-danger w-100 mt-5" onclick="logout()">Logout</button>
            </div>

            <!-- Content -->
            <div class="col-md-10 p-4">
                
                <!-- Doctors Tab -->
                <div id="doctorsTab" class="tab-content">
                    <div class="d-flex justify-content-between mb-3">
                        <h2>Manage Doctors</h2>
                        <button class="btn btn-success" onclick="openDoctorModal()">+ Add Doctor</button>
                    </div>
                    <table class="table table-striped table-hover bg-white shadow-sm">
                        <thead class="table-dark">
                            <tr>
                                <th>Name</th>
                                <th>Specialty</th>
                                <th>Price</th>
                                <th>Experience</th>
                                <th>Rating</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="doctorsTableBody">
                            <!-- JS will populate this -->
                        </tbody>
                    </table>
                </div>

                <!-- Bookings Tab -->
                <div id="bookingsTab" class="tab-content" style="display: none;">
                    <h2>All Bookings</h2>
                    <table class="table table-striped table-hover bg-white shadow-sm mt-3">
                        <thead class="table-dark">
                            <tr>
                                <th>Patient Name</th>
                                <th>Doctor ID</th>
                                <th>Date</th>
                                <th>Time</th>
                                <th>Status</th>
                                <th>Payment</th>
                            </tr>
                        </thead>
                        <tbody id="bookingsTableBody">
                            <!-- JS will populate this -->
                        </tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>

    <!-- Doctor Modal -->
    <div class="modal fade" id="doctorModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="doctorModalTitle">Add/Edit Doctor</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="doctorForm">
                        <input type="hidden" id="doctorId">
                        <div class="mb-3">
                            <label>Name</label>
                            <input type="text" id="docName" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Specialty</label>
                            <input type="text" id="docSpecialty" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Price (VNĐ)</label>
                            <input type="number" id="docPrice" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Experience (Years)</label>
                            <input type="number" id="docExperience" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Save Doctor</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
